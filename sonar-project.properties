# SonarQube Cloud — CI-based analysis configuration
# Replaces Automatic Analysis (turn that OFF in the dashboard: Administration → Analysis Method).

sonar.organization=ahmadayman001
sonar.projectKey=Ahmadayman001_NECKLINE-V2
sonar.host.url=https://sonarcloud.io

# Source code (npm workspaces monorepo: Express API + Next.js web)
sonar.sources=apps/api/src,apps/web/src
sonar.tests=apps/api/tests
sonar.test.inclusions=**/*.test.js

# Coverage — Jest lcov from `npm run test:api`
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info

# Keep dependencies, build output, design assets, and generated files out of analysis
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/dist/**,**/build/**,design/**,**/*.min.js,**/*.umd.js

sonar.sourceEncoding=UTF-8
