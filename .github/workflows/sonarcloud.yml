name: SonarQube Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analysis:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so SonarQube Cloud can compute new-code and blame accurately.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Generate apps/api/coverage/lcov.info for the scanner. Does not gate analysis —
      # the dedicated CI — API workflow is what enforces tests.
      - name: API tests with coverage
        run: npm run test:api
        continue-on-error: true

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5.3.2
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
