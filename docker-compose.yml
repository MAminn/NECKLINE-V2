version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: neckline-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: dev
      MONGO_INITDB_ROOT_PASSWORD: devpassword
      MONGO_INITDB_DATABASE: neckline
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
